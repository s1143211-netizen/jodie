<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貪吃蛇</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
            color: #fff;
        }
        h1 {
            margin-bottom: 20px;
            text-shadow: 0 0 20px #00ff88;
        }
        .game-container {
            position: relative;
        }
        canvas {
            border: 3px solid #00ff88;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
        }
        .score-board {
            display: flex;
            justify-content: space-between;
            width: 400px;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .score {
            color: #00ff88;
        }
        .high-score {
            color: #ffd700;
        }
        .controls {
            margin-top: 20px;
            text-align: center;
            color: #aaa;
            font-size: 14px;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px 50px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        .game-over h2 {
            color: #ff4444;
            margin-bottom: 15px;
        }
        .game-over button {
            background: #00ff88;
            border: none;
            padding: 10px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
        }
        .game-over button:hover {
            background: #00cc6a;
        }
    </style>
</head>
<body>
    <h1>🐍 貪吃蛇</h1>
    <div class="score-board">
        <div class="score">分數: <span id="score">0</span></div>
        <div class="high-score">最高分: <span id="highScore">0</span></div>
    </div>
    <div class="game-container">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="game-over" id="gameOver">
            <h2>遊戲結束!</h2>
            <p>最終分數: <span id="finalScore">0</span></p>
            <button onclick="resetGame()">再玩一次</button>
        </div>
    </div>
    <div class="controls">
        <p>使用方向鍵 或 WASD 控制移動</p>
        <p>按 空白鍵 暫停/繼續</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = { x: 0, y: 0 };
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let isPaused = false;
        let isGameOver = false;

        highScoreElement.textContent = highScore;

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1;
            dy = 0;
            score = 0;
            scoreElement.textContent = score;
            isGameOver = false;
            isPaused = false;
            gameOverElement.style.display = 'none';
            spawnFood();
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameStep, 100);
        }

        function spawnFood() {
            food.x = Math.floor(Math.random() * tileCount);
            food.y = Math.floor(Math.random() * tileCount);
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    spawnFood();
                    break;
                }
            }
        }

        function gameStep() {
            if (isPaused || isGameOver) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreElement.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                spawnFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < snake.length; i++) {
                const segment = snake[i];
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize/2, 
                    segment.y * gridSize + gridSize/2, 
                    0,
                    segment.x * gridSize + gridSize/2, 
                    segment.y * gridSize + gridSize/2, 
                    gridSize/2
                );
                
                if (i === 0) {
                    gradient.addColorStop(0, '#00ff88');
                    gradient.addColorStop(1, '#00cc6a');
                } else {
                    const alpha = 1 - (i / snake.length) * 0.5;
                    gradient.addColorStop(0, `rgba(0, 255, 136, ${alpha})`);
                    gradient.addColorStop(1, `rgba(0, 204, 106, ${alpha})`);
                }
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    4
                );
                ctx.fill();
            }

            ctx.fillStyle = '#ff4444';
            ctx.shadowColor = '#ff4444';
            ctx.shadowBlur = 15;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize/2,
                food.y * gridSize + gridSize/2,
                gridSize/2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function gameOver() {
            isGameOver = true;
            clearInterval(gameLoop);
            finalScoreElement.textContent = score;
            gameOverElement.style.display = 'block';
        }

        function resetGame() {
            initGame();
        }

        function togglePause() {
            if (!isGameOver) {
                isPaused = !isPaused;
            }
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();

            if (key === ' ') {
                e.preventDefault();
                togglePause();
                return;
            }

            if (isPaused || isGameOver) return;

            switch(key) {
                case 'arrowup':
                case 'w':
                    if (dy !== 1) { dx = 0; dy = -1; }
                    break;
                case 'arrowdown':
                case 's':
                    if (dy !== -1) { dx = 0; dy = 1; }
                    break;
                case 'arrowleft':
                case 'a':
                    if (dx !== 1) { dx = -1; dy = 0; }
                    break;
                case 'arrowright':
                case 'd':
                    if (dx !== -1) { dx = 1; dy = 0; }
                    break;
            }
        });

        initGame();
    </script>
</body>
</html>
